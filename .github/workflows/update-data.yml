name: Update Multi-source Data

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      PH_TOKEN: ${{ secrets.PH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        if: github.event_name != 'schedule' || github.event.schedule == '0 5 * * *'
        run: python scripts/pipeline.py

      - name: Install Playwright
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch traffic data
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0'
        run: python scripts/sources/fetch_traffic.py

      - name: Notify Discord on failure
        if: failure() && secrets.DISCORD_WEBHOOK != ''
        run: |
          payload='{"content":"❌ Daily data pipeline failed on '${{ github.repository }}' at run '${{ github.run_id }}'."}'
          curl -X POST -H "Content-Type: application/json" -d "$payload" "${{ secrets.DISCORD_WEBHOOK }}"
